_metadata:
  # weblate-flags: max-length:32, ignore-same
  name: about
  # weblate-flags: max-length:100
  description: "Information about the bot (contributors, ping, stats)"

loading: "[ {loading, emoji} Measuring reply latency… ]"

fields:
  shards:
    name: "Shards"
  avg_ping:
    name: "Average ping"
  latency:
    name: "Response latency"
    value: |-
      Receive - {send_latency_ms, number, ::duration-ms}
      Send - {edit_latency_ms, number, ::duration-ms}
  version:
    name: Version
    value: "{version_type, select, tag {{version}} commit {#{commit_hash}}}, last updated {last_updated_at, date, relative}"
  server_count:
    name: "Server count"
  user_installs:
    name: "User installs"
  host:
    name: "Host"
  load:
    # load as in how busy the system is
    name: "Load"
    value: |-
      CPU - {cpu_load, number, percent}
      RAM - {mem_load, number, percent}
  uptime:
    name: "Uptime"

generic_values:
  time: "**{sec}** s."
  # weblate-flags: read-only
  percent: "**{percentage, number, percent}**"
  failed_commit_hash: "N/A"

buttons:
  contributors: Contributors
  dev server: Dev Server
  community: Community
  community server: Community Server
  support: Support
  support server: Support Server
  translate: Translate
  website: Website
  # weblate-flags: read-only
  weblate: Weblate
  # weblate-flags: read-only
  discord: Discord
  vote: Vote
  voting: Voting
  "vote (no benefits)": Vote (no benefits)
  # weblate-flags: read-only
  "top.gg": Top.gg
  # weblate-flags: read-only
  "dbl": DBL
  # weblate-flags: read-only
  patreon: Patreon
  other: Other
  # weblate-flags: read-only
  youtube: YouTube
  # weblate-flags: read-only
  bluesky: Bluesky
  # weblate-flags: read-only
  github: GitHub

mes:
  - "a discord bot based off oneshot"
  - "a testing build for The World Machine, do not invite this bot if you want The World Machine in your server"

contributors:
  contrib:
    layout:
      full: |-
        >>> ## {name}{roles, notempty, ' - {roles}'}{country_flags, notempty, ' {country_flags}'}
        {links}
      # used for translators / credits
      simple: "- {country_flags, notempty, '{country_flags}: '}{name} ({links})"
    pfp_alt_text: Their discord avatar
  categories:
    developers: My developers
    translators: My translators
  roles:
    maintainer: Maintainer
    owner: Owner
    funder: Funder
    translator: Translator
