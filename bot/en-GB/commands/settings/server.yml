errors:
  weird_edgecase_number_0: Either you or {twm, user, mention} is not in the server. If you are a server manager, please re-add {twm, user, mention} to the server.
  missing_permissions: '[ You must have the "Manage Server" permission in order to change the settings ]'
  channel_not_messageable: "[ I cannot send messages in that channel ]"
  channel_insufficient_perms: "[ I do not have enough permissions for that channel. Make sure i have all of these: **Send Messages**, **View Channel** and **Attach Files**. ]"
  invalid_server_id: "[ Invalid server ID. ]"
  uncached_server: "couldn't find the name of the server (maybe i was kicked from it)"
  get_server_id: (Discord Settings -> Advanced -> enable "Developer Mode", then look at the bottom of the server context menu)

welcome:
  enabled:
    "true": "[ Welcome textboxes have been enabled ]"
    "false": "[ Welcome textboxes have been disabled ]"
  ping:
    "true": "[ Welcome textboxes should now ping the newcomers ]"
    "false": "[ Welcome textboxes will no longer ping the newcomers ]"
  channel:
    "none": "[ Welcome textboxes channel has been reset ]"
    "some": "[ Welcome textboxes channel has been set to {channel} ]"
  editor:
    # weblate-flags: max-length:45
    title: "Editing the welcome textbox message…"
    input: "Welcome Message"
    placeholder: "Variables you can use: {user_name} {server_name} {member_count}"
    done: "[ Successfully updated the welcome textbox message ]"
    new_none: "[ Reset to default ]"
    changes: |
      Previous: {old_text}

      New (current): {new_text}
    templates:
      default: |-
        [ Welcome \c[#c386ff]{user_name}\c to \c[#c386ff]{server_name}\c! This server now has {member_count, plural,
            one {# user}
            other {# users}}. ]

transmissions:
  enabled:
    "true": "[ This server is now open for calls ]"
    "false": "[ This server is now closed for calls ]"
  channel:
    "none": "[ Transmission channel has been reset ]"
    "some": "[ Transmission channel has been set to {channel} ]"
  images:
    "true": "[ Enabled transmission images ]"
    "false": "[ Disabled transmission images ]"
  anonymous:
    "true": "[ Successfully enabled anonymous mode ]"
    "false": "[ Successfully disabled anonymous mode ]"
  block:
    "true": "[ Successfully blocked `{server_name}` ]"
    "false": "[ Successfully unblocked that server ]"

minis:
  warnings:
    channel_lost: "Something broke last time i tried to send a welcome textbox in the channel you chose. Make sure i have enough permissions in it and it exists. You can change the channel using {/settings/welcome/channel}, or in Server Settings → Overview → ꜱʏꜱᴛᴇᴍ ᴍᴇꜱꜱᴀɢᴇꜱ ᴄʜᴀɴɴᴇʟ"
  notes:
    welcome_disabled: "don't forget to enable them with {/settings/welcome/enabled}` value:True`"
  tips:
    welcome_edit: "you can change the textbox message with {/settings/welcome/edit}"
