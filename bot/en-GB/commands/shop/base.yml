    success: '> Successfully traded for {amount, pretty_num} of "{item_name}"!' # {price} is also available here
  selling:
    success: '> Sucessfully traded in {amount, pretty_num} "{item_name}" for {price, pretty_num} Wool!'
  errors:
    generic_trade_fail: "> You cannot trade for this."
