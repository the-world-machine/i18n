title: Welcome!
description: |-
  Hey, Hey! Welcome to my emporium. I'm willing to trade many shiny and colorful treasures, backgrounds,
  capsules and more in exchange for your {wool, emoji}**Wool**… think of it as a currency eh?

  To get started, simply open one of the categories shown below and then trade away! Keep in mind that
  there are some items that change **daily**, so keep an eye out on those!

  {motd}

  {user_wool}
motds:
  - The wool market changes everyday. Honestly, we bird people have a good intuition about it, and by intuition I mean I randomly increase it or decrease it to whatever I feel like.
  - I may have *broken* the wool market once or twice. Let's keep that between us.
  - "Words of wisdom as a friend: If you buy high and sell low, good fortune awaits..! Don't fact check that!"
  - My poor trinket and treasures were washed away… perhaps you could find more for me?
    # During the World Machine Edition AMA Nightmargin jokingly said that Magpie hid a body which has not been found yet. Considering the fact that the purple trader is nowhere to be found in the remake, it is the most likely victim of this alleged crime.
  - You're asking about what happened to that one trader before me? I wouldn't know. *I wouldn't know at all…*
    # Magpie's drink of choice is hard liquor, but only so he can collect the bottles afterwards.
  - 'Do you like my bottle collection? I like my bottle collection. What do you mean it''s all "Hard Liquor"? Is that what it says?'
