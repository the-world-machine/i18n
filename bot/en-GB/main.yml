generic:
  loading:
    hint: "[ {loading, emoji} ]"
    generic: "[ {loading, emoji} Loading… ]"
    evaluating: "[ {loading, emoji} Evaluating… ]"
    checking_developer_status: "[ {loading, emoji} Checking developer status… ]"
    failed: "[ {sleep, emoji} Loading… failed ]"
  errors:
    not_a_developer: "[ Sorry, you are not one of my developers, can't letcha in ]"
    expired: "This interaction has expired. Run the command again, or report this error in our community discord server if it keeps happening. (you can find an invite to it in {/about})"
  command_cooldown: "[ This command is on a cooldown for you. Come back {cooldown_end, time, relative} to use it again. ]"

  buttons:
    "yes": "Yes"
    "no": "No"
    done: "Done"
    cancel: "Cancel"
    back: "Back"
    forwards: "Forwards"
    continue: "Continue"
    next: "Next"
    previous: "Previous"
    open_site: "Open Website"
    dont_show_again: "Don't Show Again"
    up: "Up"
    top: "To the Top"
    down: "Down"
    bottom: "To the Bottom"
    accept: "Accept"
    decline: "Decline"

  minis:
    note: "❕ note:"
    tip: "❔ tip:"
    warn: "⚠️ warning:"
    err: "‼️ error:"

  select:
    multiple: ({current, pretty_num}/{total, pretty_num})

  responses:
    timeout:
      yn: "[ You took too long to respond ]"
