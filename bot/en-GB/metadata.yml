  description: |
    ![The World Machine Logo](https://media.discordapp.net/attachments/1025158501540036639/1049326772161888369/The_World_Machine_Logo.png?ex=69d072f6&is=69cf2176&hm=889524a31287fb9c1c4680ccce21cbb567270143f985e5a91383ef0614466a32&)

    💡 **Bring the world of OneShot to your Discord server!**
    The World Machine can now roam the internet, and it's interacting with you through Proxot. 

    👾 **Nikogotchi (Virtual Pets/Tamogotchis)**
    Adopt and care for your very own pint-sized OneShot characters! Feed them, clean them, and give them plenty of pets. Level up their stats and flex your happy companions to your friends (buy a capsule in the `/shop` and then use `/nikogotchi check`)

    💬 **Custom Textboxes**
    Create any lines/dialogue, use the `/textbox create` command to generate animated OneShot dialogue boxes, like this one: ![An animated OneShot textbox. First, The World Machine, with a proxot flower on their hat, says: "wow this discord thing is so cool and pawesome". Then, Kip Silverpoint, wearing sunglasses, replies: "it's true"](https://media.discordapp.net/attachments/1336864890706595852/1489148082032611338/TWM_textbox_2_1775110968.GIF?ex=69d0ae39&is=69cf5cb9&hm=5c6b73d7392540e9156b41a019821d285469dca047ece12a8c06955e1078c380&)

    📺 **Transmissions**
    Similar to Yggdrasil's userphone, Transmissions allow you to call and chat in real-time with users in entirely different Discord servers (use `/transmit connect` in both servers)

    🪪 **Profile Stamps**
    Show off your dedication. Earn unique stamps for your Proxot profile by reaching milestones and show off your stats
