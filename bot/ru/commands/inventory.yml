commands:
  treasures:
    minis:
      where_to_get_treasure: "вы можете получить больше сокровищ торговлей в магазине или отправкой Никоготчи на поиски таковых!"
    empty: "[ У {user_id, user, mention} нет ни единого сокровища ]"
    message: |
      ### сокровища {user}
      {treasures}

items:
  entry_template: "**`{spacer}{amount, pretty_num}`** {icon} {name}"

  treasures:
    amber:
      name: Светящийся Янтарь
      description: На нем изображен трехлистный клевер.
    bottle:
      name: Бутыль Спирта
      description: Бутылка спирта. Идеально подходит для приготовления коктейлей Молотова.
    card:
      name: '"Настоящая" Библиотечная Карточка'
      description: На ней приклеена фотография Нико.
    clover:
      name: Светящийся Клевер
      description: Просто светящийся клевер.
    die:
      name: Светящийся Кубик
      description: Кубик со светящимися точками.
    journal:
      name: Таинственный Журнал
      description: Он написан на неизвестном языке.
    pen:
      name: Светящееся Перо
      description: Длинное и тонкое перо со светящимися краями.
    shirt:
      name: Новая Футболка
      description: "«Я пас баранов, и все, что я получил, — всего лишь эта паршивая футболка!»"
    sun:
      name: Солнце
      description: Большая лампочка. Это — солнце.

  pancakes:
    normal:
      name: Блинчики
      description: |
        Базовый минимум для кормления Никоготчи.
        *+25 🥞*
        *+1 ❤️*
    golden:
      name: Золотые Блинчики
      description: |
        Дорогущие, но того стоящие.
        *MAX 🥞*
        *+25 ❤️*
    glitched:
      name: "???"
      description: Я без понятия, как это здесь оказалось.

  capsules:
    blue: Капсула Пустошь
    green: Капсула Глена
    red: Капсула Пристанища
    yellow: Капсула Солнцестояния

  backgrounds:
    Alula and Calamus: Алула и Каламус
    Barrens: Пустоши
    Glens: Глен
    Refuge: Пристанище
