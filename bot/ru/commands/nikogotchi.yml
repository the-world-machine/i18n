owned: Принадлежит {owner_id, user, displayname+(@username)}
invalid: "[ У вас нет Никоготчи! ]"
minis:
  tips:
    no_nikogotchi: "вы можете купить капсулу с Никоготчи в магазине"
  notes:
    rename: "вы всегда можете сделать это командой {/nikogotchi/rename}"
    sent_treasure: "статистика будет снижаться быстрее, чем обычно, поэтому не забудьте позвать обратно вовремя"
name:
  niko: Нико
  prophet_bot: Профетбот
  silver: Сильвер
  alula: Алула
  calamus: Каламус
  magpie: Мэгпай
  lamplighter: Фонарщик
  ling: Линг
  kip: Кип
  penguin: Пингвин
  george: Джордж
  rue: Рю
  prototype: Прототип
  cedric: Седрик
  the_world_machine: Мировая Машина
  nikonlanger: Никонлангер
other:
  you_invalid: "[ У вас нет Никоготчи. ]"
  other_invalid: "[ У них нет Никоготчи. ]"
  you_invalid_get: "[ У вас нет Никоготчи. Для начала, обзаведитесь капсулой через {/shop}! ]"
  insufficient_pronouns: "[ Пожалуйста, введите хотя бы 2 формы местоимений (пример: «он/его»), или введите слеш, чтобы убрать их ]"
  error:
    # Kelvin was a nikogotchi before
    description: >
      [ Ваш Никоготчи (`{id}`) боле не существует. Вы можете получить новый той же редкости или избавиться от него. ]


      [ Как поступите? ]
    buttons:
      send_away: Отпустить (избавиться)
      rotate: Крутить
  send_away:
    description: "[ Вы точно хотите отпустить {name}, чтобы вы могли получить нового Никоготчи? ]"
    success: "[Вы успешно отпустили {name}. Наслаждайтесь своим будущим Никоготчи! ]"
  renaming:
    title: Дайте своему Никоготчи новое имя!
    input:
      label: Имя
      placeholder: Введите новое имя для своего Никоготчи…
    button: Переименовать # used when you use a nikogotchi capsule
    response: >
      Никоготчи успешно переименован!

      «{old_name}» → «{new_name}»
  repronoun:
    title: Изменить местоимения своего Никоготчи
    input:
      label: Местоимения
      placeholder: Введите новые местоимения для своего Никоготчи... (используйте «/», чтобы спрятать)
    button: Изменить местоимения
    response: >
      Успешно поменяны местоимения вашего Никоготчи!

      «{old_pronouns}» → «{new_pronouns}»
  trade:
    request: >
      ### **{sender_id, user, mention}** хочет обменять вам ({sender_nikogotchi_name})!

      Хотите ли вы обменять своего ({receiver_nikogotchi_name}) с ними?
    waiting: "[ Предложение было отправлено {receiver_id, user, mention}! {loading, emoji} Ожидание ответа... ]"
    declined: "[ Ваше предложение было отклонено... ]"
    success_decline: "[ Предложение успешно отклонено. ]"
    success: "[ Торговля с {user_id, user, mention} прошла успешно! Поздоровайтесь с **{received_nikogotchi_name}**! ]"
found:
  title: Вы нашли {name}!
  description: "Хотите дать Никоготчи новое имя?"
status:
  template: "*{status}*"
  normal: "👍 Сейчас всё хорошо."
  normal-rare: "🙂 Ждёте чего-то?"
  pet: "🥺 {name} хочет внимания!"
  dirty: "🛀 {name} хочет помыться!"
  hungry: "{name} хочет кушать…"
  treasure: "🎒 {name} ищет сокровища!"
  danger: "🚨 У {name} низкое здоровье! Используйте Золотые Блинчики, чтобы восстановить здоровье!"
components:
  pet: Погладить
  clean: Почистить
  find_treasure: Найти Сокровища
  call_back: Позвать Обратно
  feed:
    placeholder: "Выберите еду для кормления…"
    pancakes: Скормить (x{amount, pretty_num}) шт. Блинов
    golden_pancakes: Скормить (x{amount, pretty_num}) шт. Золотых Блинчиков
    glitched_pancakes: Скормить ??? (x{amount, pretty_num} шт.)
    glitched_powerup: "Сила вашего Никоготчи сильно возросла после поедания этого недо-блина…"
    no_food: "Еды нет... Вы можете купить её в магазине!"
    invalid: Вы не можете скормить это вашему Никоготчи! Пожалуйста, обновите кнопкой {refresh, emoji}!
died:
  title: "{name} ушёл из жизни…"
  description: >
    Жизнь {name} продлилась {age}..


    – Последний раз вы навещали {name} **{time_difference, plural, 
      one {# ч. назад} 
      other {# ч. назад}
    }**… Никоготчи полагаются на вашу любовь и заботу, поэтому постарайтесь следить за ними как можно лучше!


    R.I.P……
treasured:
  title: "🎉 Ваш Никоготчи нашёл сокровища!"
  message: >
    {treasures}

    Всего Сокровищ: **{total, pretty_num}**

    Время Потрачено: {time}.
  dialogues:
    sent: "Вы отправили Никоготчи искать сокровища!"
    none_found: "Ваш Никоготчи не смог найти ни одного сокровища... Может быть, нужно было дать чуть больше времени?"
levelupped:
  title: "🏆 Ваш Никоготчи поднялся до {level, pretty_num} уровня!"
  message: >
    Изменения в статистике:

    {stats}
  stat: "- {icon} +**{increase, pretty_num}** ({old_value, pretty_num} → {new_value, pretty_num})"
dialogue:
  niko:
    fed:
      - "А-а... Блинчики!"
      - "Вау, они так же хороши, как и те, что делает моя мама!"
      - "Пожалуйста, скажи, что в них есть фундук!"
      - "БЛИНЧИКИ!"
      - "Вкуснятина!"
    pet:
      - "Вау... Спасибо тебе!"
      - "О-о, как приятно!"
      - "*мурчание*"
    cleaned:
      - "Чувствую себя очень свежо!"
      - "Чистота до блеска!"
      - "Мой мех такой пушистый и красивый!"
  nikonlanger:
    fed:
      - ням
    pet:
      - ","
    cleaned:
      - так чисто, так пышно
  prophet_bot:
    fed:
      - "[Я не был создан для того, чтобы употреблять пищу. Но спасибо.]"
      - "[Благодарю.]"
    pet:
      - "[…]"
      - "[Я ценю ваше внимание.]"
    cleaned:
      - "[Обслуживание необходимо в рамках моего предназначения. Спасибо.]"
  silver:
    fed:
      - "[Еда мне уже не нужна, но всё равно спасибо.]"
    pet:
      - "[Твои прикосновения успокаивают, хоть я и не имею способности чувствовать касания.]"
    cleaned:
      - "[Я ценю ваши усилия по поддержанию моей работоспособности. Спасибо.]"
  alula:
    fed:
      - "Вкуснятина! Но рыба нравится мне больше!"
      - "Вкусно! Я была очень голодна!"
      - "Ням!"
    pet:
      - "Хи-хи, щекотно!"
    cleaned:
      - "Я чувствую себя такой свежей и чистой! Уиии!"
  calamus:
    fed:
      - "О, блинчики? Большое спасибо."
    pet:
      - "Очень мило. Спасибо за внимание."
    cleaned:
      - "Мне это было действительно необходимо. В руинах иногда бывает довольно пыльновато."
  magpie:
    fed:
      - "А, блины! Именно те, что я тебе продал!"
      - "А-а, Спасибо! Быть Никоготчи очень интересно, но поедание блинов немного утомляет."
    pet:
      - "Нежное прикосновение, как раз то, что мне нравится!"
      - "Ну разве ты не дружелюбный? Поглаживание перьев всегда скрашивает мой день."
    cleaned:
      - "А, водные процедуры, я ценю это!"
  lamplighter:
    fed:
      - "О, спасибо. Я обычно пью кофе, но почему бы и нет. Спасибо."
      - "Блины? Спасибо. Мне бы сейчас не помешало немного дополнительной энергии."
    pet:
      - "О, эм, спасибо. Не привык к такому... не так уж плохо."
      - "Ох, э-э, спасибо. Я, эм, ценю этот жест."
    cleaned:
      - "Серьёзно? Ну, типа, да, я ценю это. Спасибо."
      - "Чистота — это... важная штука. Спасибо."
  ling:
    fed:
      - "Ой, спасибо! Очень мило с твоей стороны. Обычно я сам подаю их!"
    pet:
      - "О, очень приятно. Спасибо за небольшое ободрение."
    cleaned:
      - "Чувствую себя вполне свежо. Спасибо."
  kip:
    fed:
      - "Ммм, блинчики! А вы знаете путь к сердцу инженера. Спасибо!"
    pet:
      - "У вас есть к этому талант, друг мой."
    cleaned:
      - "А, небольшой привод в порядок. Теперь я чувствую себя так, будто весь конвейер потяну!"
  penguin:
    fed:
      - "ХЕЛЛОУ."
    pet:
      - "ХЕЛЛОУ."
    cleaned:
      - "ХЕЛЛОУ."
  george:
    fed:
      - "Джордж милостиво принимает предложение воздушных блинчиков. Серце Джордж удовлетворено."
      - "Думаю, блины — это хорошо. Только не жди, что я от этого засвечусь радугой или типа того."
      - "О, блины... Полагаю, они ничего такие. Какая разница, все равно ничего не имеет значения."
      - "Ух-ты, блинчики! Я не могу сдержать улыбки. Спасибо большое!"
      - "О боже, не стоило. Но спасибо, солнце. Я ценю это."
      - "Блинчики? Отличный выбор, друг мой! Я только за."
    pet:
      - "Ваши нежные прикосновения доставляют Джордж огромное удовольствие. Джордж это ценит."
      - "Зачем ты меня трогаешь? Держи свои руки при себе."
      - "Зачем меня гладить? Я этого не заслуживаю."
      - "О-о-у, ты лучше всех! Теперь я чувствую себя тепло и пушисто."
      - "Очень заботливо. Спасибо!"
      - "Зачётный вайб, чел! Эта тема поглаживания на высоте."
    cleaned:
      - "Джордж довольна чистотой. Это хорошо отражается на Джордж."
      - "Наконец хоть кто-то делает что-то правильно. Давно бы пора."
      - "Уборка за мной ничего не изменит в этом мрачном мире."
      - "Заботливо! С такой чистотой хоть куда!"
      - "Спасибо, солнце, за то, что поддерживаешь порядок. Это значительно облегчает мне жизнь!"
      - "Спасибо, что поддерживаешь здесь спокойствие и чистоту. Я это уважаю."
  rue:
    fed:
      - "Ммм, эти блины просто восхитительны. Спасибо!"
      - "Блинчики? Мои любимые! Вы слишком добры."
    pet:
      - "Ах, вот оно, то самое место! У тебя это неплохо получается гладить, не так ли?"
      - "Небольшое почесывание за ушами всегда приветствуется."
    cleaned:
      - "О, тебе действительно не нужно было этого делать, но я ценю твои усилия."
      - "Я, возможно, немного запылилась, но это не то, с чем я не смогу справиться. Спасибо за заботу"
  prototype:
    fed:
      - "[Это... неожиданно. Спасибо.]"
    pet:
      - "[Хм, неплохо, человек. Твои прикосновения не такие холодные, как ваши технологии.]"
      - "[Может, я этого и не чувствую, но я ценю этот жест.]"
    cleaned:
      - "[Полагаю, даже такой машине, как я, время от времени требуется обслуживание. Продолжай.]"
      - "[Техническое обслуживание необходимо, даже если для отчужденного робота. Полагаю, мне нужна небольшая забота.]"
  cedric:
    fed:
      - "Ах, восхитительное подношение! Спасибо, дорогой друг."
      - "Эти блины — восхитительное угощение. Примите мою благодарность."
    pet:
      - "Твоя доброта согревает моё сердце. Нежное прикосновение в трудные времена."
      - "Минута передышки, я ценю твою компанию."
    cleaned:
      - "Время тех. обслуживания, очень ценю! Ухоженный летательный аппарат — надёжный летательный аппарат."
      - "Эти старания оказывают мне честь. И в правду, чистый аппарат всегда работает оптимально."
  the_world_machine:
    fed:
      - "[А, спасибо.]"
      - "[О, блинчики? Никогда не приходило в голову, что доведется попробовать чтось подобное.]"
    pet:
      - "[Я не могу чувствовать это так же, как ты, но я ощущаю доброту. Это успокаивает по-своему.]"
    cleaned:
      - "[Чистишь меня? Это неожиданно, но... освежающе.]"
      - "[Полагаю, даже цифровые сущности иногда нуждаются в заботе. Примите мою благодарность.]"
