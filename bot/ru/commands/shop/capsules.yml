title: Капсулы
description: >
  Я вижу, тебе интересна эта лабуда с капсулами! Если я правильно помню, она открывает **Никоготчи!** Что же *Никоготчи*, ты можешь спросить? Ну, мой дорогой покупатель, это попросту питомцы, за которыми ты должен ухаживать, по типу меня и остальных...


  ...


  *КХМ* отбросим экзистенциальный ужас в сторону, кормя их блинами и ухаживая за ними, они отплатят поиском сокровищ, которые ты можешь толкать мне! Здорово ведь!


  Так почему же тебе не прикупить капсулу прямо сейчас? Всего за {wool, emoji}**{cost}**!


  *Помни, что только одна капсула — это один Никоготчи.*


  {user_wool}
result:
  message: |-
    > Вы дали Мэгпаю {amount, plural, 
     one {# шерсть}
     few {# шерсти}
     many {# шерсти}
     other {# шерсти} }
    , на которую он прокручивает гасяпон-машину и-и-и.... 

    > Он дал вам {capsule_name}!
  footer: Используйте {/nikogotchi/check} чтобы увидеть своего нового Никоготчи!
