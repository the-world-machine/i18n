title: Добро пожаловать!
description: |-
  Эй-эй! Добро пожаловать в мою лавку. Я готов обменять кучу разноцветных блестящих сокровищ, фонов,
  капсул и прочего за твою {wool, emoji}**Шерсть**... считай, что это что-то вроде валюты, окей?

  Чтобы начать, выбери любую категорию ниже и начинай торговать! Имей в виду, что некоторые предметы 
  обновляются **ежедневно**, так что поглядывай иногда за товаром!

  {motd}

  {user_wool}
motds:
  - Рынок шерсти меняется каждый день. Честно говоря, у нас, птице-людей, хорошее чутьё рынка, и под чутьём я имею в виду изменение его от того, как мне вздумается.
  - Может я и *ломал* разок или два рынок, но пусть это останется между нами.
  - "Мудрые дружественные слова: успех ждёт тех, кто покупает втридорога и продаёт дёшево!.. Не проверяй на практике!"
  - Мои бедные безделушечки и сокровища смыло... может быть, ты сможешь найти мне замену им?
  - Ты спрашиваешь о том, что случилось с тем торговцем до меня? Я бы не знал. *Я бы вообще не знал...*
  - "Тебе нравится моя коллекция бутылок? Мне нравится моя коллекция бутылок. В смысле, это всё — «Крепкий Ликёр»? Там так написано?"
