minis:
  warnings:
    ephemeral: Если вы хотите добавить это в ⭐ Избранное — убедитесь, что вы скачали это как файл и отправили где-нибудь. Файлы из эфемерных сообщений (т.е., что видите только вы) показываются непродолжительно — Дискорд удаляет их в районе 15 минут. Так что скачайте, иначе оно будет отображаться, как синий квадрат в вашем списке избранного
    toolong_for_image: Введённый текст кадра не умещается в выходное *изображение*, — он полностью отобразится только если вы измените расширение выходного файла на то, что может быть анимировано.
