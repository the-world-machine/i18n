      - "{user_one} бупает нос {user_two}!"
      - "{user_one} протянул руку и бупает {user_two}!"
      - "{user_one} с ничего бупает {user_two}!"
      - "{user_one} игриво бупнул {user_two}!"
    - name: Деликатно
      phrases:
      - "{user_one} нежно бупнул и погладил нос {user_two}"
      - "{user_one} изящно доставляет буп {user_two}"
      - "{user_one} нежно нажимает на нос {user_two}"
      - "{user_one} деликатно бупнул нос {user_two}"
    - name: Недовольно
