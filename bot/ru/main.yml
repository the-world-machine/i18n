      - "[Может, я этого и не чувствую, но я ценю этот жест.]"
      cleaned:
      - "[Полагаю, даже такой машине, как я, время от времени требуется обслуживание. Продолжай.]"
      - "[Техническое обслуживание необходимо, даже если для отчужденного робота. Полагаю, мне нужна небольшая забота.]"
    cedric:
