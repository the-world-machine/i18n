_metadata:
  name: interact
  description: Interact with others in various ways (sends a message in chat)
options:
  with:
    name: with
    description: The interactee (can be @, won't ping everyone/here/roles though)
  user_one:
    name: user_one
    description: Optional replacement for the first user (same as interactee, but message won't ping anyone)

twm_not_being_very_happy: "[ Не чіпай мене, {user_id, user, mention}. ]"
twm_questioning_if_youre_stupid_or_not: "[ {user_id, user, mention}, не думаю що ви можете взаємодіяти з ботами. ]"
twm_is_fed_up_with_you: "[ *зітх* Ви не можете взаємодіяти з собою, {user_id, user, mention}. ]"

errors:
  no_path: "Взаємодія не знайдена, спробуйте виконати команду ще раз. Якщо ця помилка все ще з'являється, будь ласка, повідомте про це в сервері мого суспільства (ви можете знайти запрошення до нього у {/about})"
  500: "Неочікувана помилка, спробуйте виконати команду ще раз. Якщо помилка все ще з'являється, будь ласка, повідомте про це в сервері мого суспільства (ви можете знайти запрошення до нього у {/about})"
  fail: Не вдалося надіслати взаємодію

phrases:
  - name: Тикнути
    phrases:
      - name: Базове
        phrases:
          - "{user_one} тикнув {user_two}"
      - name: Грайливо
        phrases:
          - "{user_one} тикнув носа {user_two}!"
          - "{user_one} потягнувся та тикнув {user_two}!"
          - "{user_one} кумедно тикнув {user_two}!"
          - "{user_one} грайливо тиснув носик {user_two}!"
      - name: Делікатно
        phrases:
          - "{user_one} ніжно тикнув та погладив ніса {user_two}"
          - "{user_one} ніжно тиснув носик {user_two}"
          - "{user_one} легенько торкнувся носика {user_two}"
          - "{user_one} залишив ніжний тик на носику {user_two}"
      - name: Розчарувально
        phrases:
          - "{user_one} агресивно тикнув {user_two}"
          - "{user_one} тиснув носик {user_two} через роздратування"
          - "{user_one} сердито подихав і тиснув носик {user_two}"
          - "{user_one} випустив свою досаду, міцно тиснувши носик {user_two}"
      - name: Нездоланно
        phrases:
          - "{user_one} відчув потребу тиснути носик {user_two}!"
          - "{user_one} просто тикнув {user_two}!"
          - "{user_one} не втримався та тикнув {user_two}"
          - "{user_one} піддався спокусі та тиснув носик {user_two}"
      - name: Розгублено
        phrases:
          - "{user_one} залишив {user_two} у плутанині через тик!"
          - "{user_two} отримав неочікуваний тик від {user_one}!"
          - "{user_one} тикнув {user_two} залишивши його без слів!"
          - "{user_one} залишив {user_two} у задумі, чому його тиснули за носик"
      - name: Мило
        phrases:
          - "{user_one} дав {user_two} наймиліший маленький тик!"
          - "{user_one} тиснув носик {user_two} і мило захихотів!"
          - "{user_one} не впорався з тим, наскільки милий {user_two}, і тиснув його носик!"
          - "{user_one} з посмішкою залишив розтаючий тик на носику {user_two}!"
  - name: Дати ляща
    phrases:
      - "{user_one} дав ляща користувачу {user_two}, напевно заслужив."
      - "{user_one} дає в щоку {user_two}!"
      - "{user_two} внезапно получив по щоці від {user_one}!"
  - name: Погладити
    phrases:
      - "{user_one} погладив {user_two}!"
  - name: Погладити по голові
    phrases:
      - "{user_one} погладив {user_two} по голові!"
  - name: Лоскотати
    phrases:
      - "{user_one} несподівано почав лоскотати {user_two}!"
      - "{user_one} несподівано залоскотав {user_two}!"
      - "{user_one} полоскотав {user_two} та розпочав лоскотоборотьбу!"
      - "{user_one} атакував {user_two} лоскотом!"
  - name: Обіймати
    phrases:
      - "{user_one} обіймав {user_two}!"
  - name: Міцно обіймати
    phrases:
      - "{user_one} міцно обіймав {user_two}!"
  - name: Поцілувати
    phrases:
      - name: Звичайний
        phrases:
          - "{user_one} поцілував {user_two}! ❤️"
      - name: Теплий
        phrases:
          - "{user_one} тепло поцілував {user_two} ❤️"
      - name: Романтичний
        phrases:
          - "{user_one} притягнув {user_two} ближче і поділився повільним, ніжним поцілунком"
      - name: Поцілунок у щоку
        phrases:
          - "{user_one} залишив солодкий поцілунок на щоці {user_two}"
          - "{user_one} змусив {user_two} почервоніти від ніжного поцілунку в щоку!"
  - name: Атакувати
    phrases:
      - name: Вдарити
        phrases:
          - "{user_one} вдарив {user_two}, це було боляче."
      - name: Випадкова комбо
        phrases:
          - "{user_one} завдав швидке комбо 1-2 по {user_two}!"
          - "{user_one} завдав три швидкі удари з подальшим правим боковим ударом по {user_two}!"
          - "{user_one} повністю перейшов у режим шквалу по {user_two}!"
      - name: Подушка
        phrases:
          - "{user_one} вдарив {user_two} по потилиці пухкою подушкою!"
          - "{user_one} запустив потік подушок у {user_two}! Жодного пір'я не залишилося!"
          - "{user_one} замахнувся подушкою на {user_two} у м'якій атаці!"
  - name: 🔥
    phrases:
      - name: Маленький камінь
        phrases:
          - "{user_one} кинув маленький камінь у {user_two}!"
          - "{user_one} кинули купу камінців на {user_two}!"
          - "{user_one} виймають із землі гігантський камінь і запускають його на {user_two} силою думки"
      - name: Коктейль Молотова
        phrases:
          - "{user_one} кинув коктейль Молотова на {user_two} ‼️"
      - name: Пуста Бутля (ауч)
        phrases: # VIOLENCE
          - "{user_one} кинув пусту бутилку на голову {user_two}"
          - "{user_one} розбив пусту бутилку об голову {user_two}"
      - name: Шматок Вовни
        phrases:
          - "{user_one} розмахнувся та кинув шматок вовни до {user_two}, та вона впала не пройшовши половину шляху"
          - "{user_one} відпустив маленький 🤏 щіпку вовни над головою {user_two}"
          - "{user_one} потер лице {user_two} великим жмутом вовни"
          - "{user_one} залоскотав ухо {user_two} маленькою щіпкою вовни"
modifiers:
  no_item: 'у {user_one} закінчились "{item}" для використання над {user_two}!'
