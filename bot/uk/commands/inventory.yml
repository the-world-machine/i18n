commands:
  treasures:
    minis:
      where_to_get_treasure: "ви можете отримати більше скарбів обмінюючись у крамничці, чи відправляючи Нікоґотчі на пошуки!"
    empty: "[ {user_id, user, mention} не має ніяких скарбів ]"
    message: |
      ### Скарби {user}
      {treasures}

items:
  entry_template: "**`{spacer}{amount, pretty_num}`** {icon} {name}"

  treasures:
    amber:
      name: Світящийся Янтар
      description: Має візерунок з трьохлистого конюшини.
    bottle:
      name: Пляшка Алкоголя
      description: Пляшка Алкоголя. Ідеально підходить для виготовлення коктейлів Молотова.
    card:
      name: '"Справжня" Бібліотечна Картка'
      description: На ній наклеєно фото Ніко.
    clover:
      name: Сяюча Конюшина
      description: Світляча конюшина.
    die:
      name: Сяючий Кубик
      description: Кубик з сяючими точками.
    journal:
      name: Таємничий Журнал
      description: Написаний невідомою мовою.
    pen:
      name: Сяюче перо
      description: Довге та тонке перо з сяючими краями.
    shirt:
      name: Сорочка-новинка
      description: '"Я пастухував баранів, і все, що я отримав, це ця паршива футболка!"'
    sun:
      name: Сонце
      description: Велика лампочка. Це сонце.

  pancakes:
    normal:
      name: Млинці
      description: >
        Мінімальна доза їжі для Нікоґотчі.

        *+25 🥞*

        *+1 ❤️*s

    golden:
      name: Золоті Млинці
      description: >
        Коштовне, але варте цього.

        *УСЕ 🥞*

        *+25 ❤️*

    glitched:
      name: "???"
      description: Я навіть не знаю як це сюди потрапило.

  capsules:
    blue: Капсула Пустоші
    green: Капсула Долини
    red: Капсула Притулку
    yellow: Капсула Сонцестояння

  backgrounds:
    Alula and Calamus: Алула та Каламус
    Barrens: Пустош
    Glens: Долина
    Refuge: Притулок
    Pancakes: Млинці
    Magpie: Магпій
    Catwalk: Підвісні Платформи
    Ruins: Руїни
    Factory: Фабрика
    Lamplighter: Лампадник
    Library: Бібліотека
    The World Machine: Світова Машина
    The Author: Автор
