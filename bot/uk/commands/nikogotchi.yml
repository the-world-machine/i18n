other:
  you_invalid: "[ У вас немає Нікоґотчі. ]"
  other_invalid: "[ У них нема Нікоґотчі. ]"
  you_invalid_get: "[ У вас немає Нікоґотчі. Отримайте капсулу у {/shop} перед тим як це робити! ]"
  error:
    description: >
      [ Вашого Нікоґотчі (`{id}`) більше не існує. Ви можете отримати іншого з тією ж рідкістю або відпустити
      його. ]


      [ Що ви бажаєте зробити? ]
    buttons:
      send_away: Відпустити
      rotate: Отримати іншого

  send_away:
    description: "[ Ви впевнені що бажаєте відпустити {name}, щоб ви могли отримати нового Нікоґотчі? ]"
    success: "[ Успішно відпущено {name}… Насолоджуйтесь вашим наступним Нікоґотчі! ]"

  renaming:
    title: Надайте свойому Нікоґотчі нове ім'я!
    input:
      label: Ім'я
      placeholder: Введіть нове ім'я для вашого Нікоґотчі…
    button: Перейменувати # used when you use a nikogotchi capsule
    response: >
      Успішно перейменовано вашого Нікоґотчі!

      "{old_name}" → "{new_name}"

  repronoun:
    title: Оберіть нові займенники свойому Нікоґотчі
    input:
      label: Займенники
      placeholder: Введіть нові займенники вашому нікоґотчі... (використовуйте просто "/" якщо хочете прибрати)
    button: Займенникувати
    response: >
      Успішно змінені займенники вашого Нікоґотчі!

      "{old_pronouns}" → "{new_pronouns}"

  trade:
    request: >
      ### **{user_id, user, mention}** бажають обмінятись їхнім Нікоґотчі ({name_one}) з вами!

      А ви бажаєте обміняти свій? ({name_two})

    waiting: "[ Запит на обмін відправлений до {user_id, user, mention}! Очікуємо їх відповіді... {loading, emoji} ]"
    declined: "[ Ваш запит на обмін був відхилений… ]"
    success_decline: "[ Запит на обмін успішно відхилений. ]"
    success: "[ Запит на обмін з {user_id, user, mention} був прийнятий та успішно виконаний! Привітайте нового Нікоґотчі: **{name}**! ]"

  insufficient_pronouns: "[ Будь ласка введіть хочаб дві форми займенників, (наприклад: «вони/їх»), чи просто введіть слеш, щоб прибрати ]"
found:
  title: Ви знайшли {name}!
  description: "Хочете прейменувати його?"
  renamenote: це завжди можна зробити пізніше за допомогою команди {/nikogotchi/rename} # note:

status:
  template: "*{status}*"

  normal: "👍 Зараз, все добре."
  normal-rare: "🙂 Щось чекаєте?"
  pet: "🥺 {name} хоче уваги!"
  dirty: "🛀 {name} хоче мийки!"
  hungry: "{name} голодний…"
  treasure: "🎒 {name} шукає скарби!"
  danger: 🚨 {name} має низький рівень здоров'я! Використовуйте Золоті Млинці, щоб значно його відновити!

components:
  pet: Погладити
  clean: Почистити
  find_treasure: На Пошук Скарбів
  call_back: Повернути з Пошуків

  feed:
    placeholder: "Оберіть їжу якою накормити…"

    pancakes: Покормити Млинцями ({amount, pretty_num} шт.)
    golden_pancakes: Покормити Золотими Млинцями ({amount, pretty_num} шт.)
    glitched_pancakes: Покормити ??? ({amount, pretty_num} шт.)

    glitched_powerup: "Ваш Нікоґотчі значно підсилився після того, як з'їв цей безладний млинець…"

    no_food: Нема Їжі… можете придбати її в крамничці!
    invalid: Ви не можете це скормити вашому Нікоґотчі! Будь ласка натисніть {refresh, emoji}!

died:
  title: "Нікоґотчі {name} вмер…"
  description: >
    {name} прожив повне життя яке тривало: {age}.


    - Ви не доглядали за вашим Нікоґотчі вже **{time_difference, plural, 
      one {# годину} 
      few {# години} 
      many {# годин} 
      other {# години}
    }**… Вони потребують вашого кохання та уваги, тому намагайтесь забезпечити їм найкращий догляд!


    R.I.P……
treasured:
  title: 🎉 Ваш Нікоґотчі знайшов скарби!
  message: >
    {treasures}

    Усього: **{total, pretty_num}**

    Шукав скарби: {time}.

  dialogues:
    sent: "Ваш Нікоґотчі вирушив на пошук скарбів!"
    senote: "їхні статистики будуть знижуватися швидше, ніж зазвичай, тому не забудьте їх покликати назад" # note:
    none_found: "Ваш Нікоґотчі не знайшов ніяких скарбів… Можливо, варто дати їм більше часу?"

levelupped:
  title: рівень підвищено до {level, pretty_num}!
  message: >
    Щодо змін характеристик:

    {stats}
  stat: "- {icon} +**{increase, pretty_num}** ({old_value, pretty_num} → {new_value, pretty_num})"

dialogue:
  niko:
    fed:
      - "Ооо… Млинці!"
      - "Вау, вони такі ж хороші, як ті, що робить моя мама!"
      - "Сподіваюся, що на цих буде фундук!"
      - "МЛИНЦІ!"
      - "Смачно!"
    pet:
      - "Вау… дякую!"
      - "Мм, це приємно!"
      - "*мурчить*"
    cleaned:
      - "Відчуваю себе досить освіженим!"
      - "Чистенько!"
      - "Моя шерсть така м’яка й пухнаста!"
  nikonlanger:
    fed:
      - "ням"
    pet:
      - ","
    cleaned:
      - "чисто пишно"
  prophet_bot:
    fed:
      - "[Їсти їжу не є моїм призначенням, але дякую.]"
      - "[Дякую за жест.]"
    pet:
      - "[…]"
      - "[Дякую за увагу.]"
    cleaned:
      - "[Технічне обслуговування необхідне для мого призначення, дякую.]"
  silver:
    fed:
      - "[Їжа більше мені не потрібна, але дякую за жест.]"
    pet:
      - "[Ваш дотик заспокоює, хоча я не маю здатності його відчувати.]"
    cleaned:
      - "[Я ціную ваші зусилля щодо підтримки моєї функції. Дякую.]"
  alula:
    fed:
      - "Ням! Проте мені більше до вподоби риба!"
      - "Смачно! Я була досить голодна!"
      - "Ням!"
    pet:
      - "Хі-хі, щикотно!"
    cleaned:
      - "Я почуваю себе так вільно та чисто! Вііі!"
  calamus:
    fed:
      - "О, млинці? Дуже дякую тобі."
    pet:
      - "Це досить приємно. Дякую за увагу."
    cleaned:
      - "Мені це було дуже подтрібно. У цих руїни досить багато пилі."
  magpie:
    fed:
      - "О, млинці! Саме ті що я тобі обміняв!"
      - "Ах, дякую! Ставати Нікоґотчі це цікаво, але їсти млинці з часом стає нудно."
    pet:
      - "Мякий дотик мені дуже до вподоби!"
      - "Ну ти справді дружелюбний! Гладка пір'я завжди піднімає мені настрій."
    cleaned:
      - "Ах, завжди ціную трохи освіження!"
  lamplighter:
    fed:
      - "О, в мене якраз була кава, буде чим заїсти :)"
      - "Млинці? Дякую. Мені зараз не завадить трохи додаткової енергії."
    pet:
      - "О, ем, дякую. Ще не звик такогго… але не дуже погано."
      - "О, дякую. Я, …ціную цей жест."
    cleaned:
      - "Справді? Ну, добре, я це ціную. Дякую."
      - "Чистота – це... важливо. Дякую."
  ling:
    fed:
      - "О, дякую! Ви дуже добрі. Зазвичай я сам їх роблю!"
    pet:
      - "О, це досить приємно. Дякую за турботу."
    cleaned:
      - "Тепер я почуваюсь досить бадьорим. Дякую."
  kip:
    fed:
      - "Ммм, млинці! Ви добре знаєте шлях до серця інженерки. Дякую!"
    pet:
      - "У вас це непогано виходить, мій друже."
    cleaned:
      - "Мм, трішки освіження? Я готова взятися за цілу виробничу лінію!"
  penguin:
    fed:
      - "ХЕЛЛОУ."
    pet:
      - "ХЕЛЛОУ."
    cleaned:
      - "ХЕЛЛОУ."
  george:
    fed:
      - "Джордж з вдячністю приймає пухкі млинці. Серце Джорджа наповнюється задоволенням."
      - "Ну, млинці, я думаю, нормально. Не чекайте, що я буду випромінювати радість і щастя."
      - "О, млинці… Можна й поїсти. Нічого в цьому світі все одно не має значення."
      - "Вау, млинці! Я не можу стримати посмішку. Дуже дякую!"
      - "Ох, не варто було, але дякую, любий. Я це дуже ціную."
      - "Млинці? Крутий вибір, друже! Я повністю за це."
    pet:
      - "Ваш ніжний дотик дуже тішить Джорджа. Джордж це цінує."
      - "Навіщо ви мене торкаєтеся? Тримайте руки при собі."
      - "Навіщо гладити мене? Я цього не заслуговую."
      - "Ааа, ти найкращий! Я почуваюся таким теплим і пухнастим зараз."
      - "Ви такі турботливі. Дякую, любий!"
      - "Релаксні вібрації, друже! Ваше вміння гладити на висоті."
    cleaned:
      - "Джордж задоволений чистотою. Це добре впливає на Джорджа."
      - "Нарешті хтось зробив щось правильно. Пора вже."
      - "Прибирання за мною нічого не змінить у цьому похмурому світі."
      - "Ви такі уважні! З чистим простором я можу зробити все!"
      - "Дякую, любий, що підтримуєте порядок. Це дуже полегшує мені життя!"
      - "Дякую, що все чисто і спокійно. Я це поважаю."
  rue:
    fed:
      - "Ммм, ці млинці смачні. Дякую!"
      - "Млинці? Мої улюблені! Ви занадто добрі."
    pet:
      - "Ммм, саме те місце! Ви досить добре це робите, чи не так?"
      - "Трошки почухати за вушками завжди приємно."
    cleaned:
      - "О, вам справді не треба цього робити, але я ціную зусилля."
      - "Я трохи запилюжена, але це нічого з того, з чим я не впораюся. Дякую за турботу"
  prototype:
    fed:
      - "[Це… несподівано. Дякую.]"
    pet:
      - "[Хм, не погано, людина. Ваш дотик не настільки холодний, як ваші технології.]"
      - "[Я можу це не відчувати, але дякую за жест.]"
    cleaned:
      - "[Я думаю, навіть машинам іноді потрібне обслуговування. Продовжуйте.]"
      - "[Технічне обслуговування необхідне, навіть для відлюдного робота. Здається, настав час трохи попіклуватися про мене.]"
  cedric:
    fed:
      - "О, смачний подарунок! Дякую, дорогий друже."
      - "Ці млинці — справжня насолода. Ви маєте мою вдячність."
    pet:
      - "Ваша доброта зігріває моє серце. Легкий дотик у складні часи."
      - "Мить відпочинку, я ціную ваше товариство."
    cleaned:
      - "Трохи догляду, дуже дякую! Добре доглянутий літальний апарат є надійним."
      - "Ви вшановуєте мене своєю старанністю. Чистий пристрій працює оптимально."
  the_world_machine:
    fed:
      - "[О, дякую.]"
      - "[О, млинці? Нажаль я не думаю, що зможу спробувати щось таке…]"
    pet:
      - "[Я не можу відчути це так, як ви, але я відчуваю вашу доброту. Вона заспокоює по-своєму.]"
    cleaned:
      - "[Ви мене чистите? Це несподівано, але відчувається... освіжаюче.]"
      - "[Мабуть, навіть цифровим істотам іноді потрібно трохи уваги. Ви маєте мою вдячність.]"
