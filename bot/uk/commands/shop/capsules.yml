title: Капсули
description: >
  Бачу, ти зацікавлений у цій дивній капсулі!
  Якщо я правильно пам'ятаю, вона використовується для розблокування **Нікоґотчі!**
  Що таке *Нікоґотчі*, запитаєш ти? Ну, це прості вихованці, про яких ти можеш піклуватися, вони засновані
  на мені або на будь-кому іншому...


  ...


  *КХМ* екзистенційні роздуми вбік, якщо годувати їх млинцями й гарно за ними доглядати, ти зможеш
  збирати скарби! А ці скарби можна обміняти на щось у мене! Досить круто, правда?


  То чому б не обмінятися на капсулу сьогодні? Усього за **{cost}**{wool, emoji}!


  *Зверни увагу, що можна мати **лише одну капсулу** на кожного Нікоґотчі.*


  {user_wool}
result:
  message: |-
    > Ви надали Магпію {amount, plural, 
     one {# вовну} 
     few {# вовни} 
     many {# вовен} 
     other {# вовни}
    }, він крутить гашапон-машину та…

    > Він вручає вам {capsule_name}!
  footer: Використайте {/nikogotchi/check} щоб побачити свого нового Нікоґотчі!
