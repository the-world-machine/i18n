title: Ласкаво прошу!
description: |-
  Гей, привіт! Ласкаво прошу до моєї крамнички. Я готовий обміняти вашу **Вовну** {wool, emoji} на багато блискучих та барвистих скарбів, фонів, капсул тощо... сприймайте це як валюту, оке?

  Щоб розпочати, просто відкрийте одну з категорій наведених нижче, та купуйте! Майте на увазі, що деякі елементи змінюються **щодня**, тому не проґавте свої шанси!

  {motd}

  {user_wool}
motds:
  - Ринок вовни змінюється щодня. Чесно кажучи, в нас, пташиних людей, є до нього дуже хороше інтуїтивне чуття, ..ну, під інтуїтивним.. я маю на увазі що випадково збільшую або зменшую ціни як мені хочеця.
  - Я, можливо, *зламав* ринок вовни кілька разів. Але давай це залишимо секретом між нами.
  - "Слова мудрості як від друга: Якщо купуєте дорого та продаєте дешево, вас чекає удача…! Не перевіряйте це!"
  - Мої брошки та скарби змилися у воді... можливо, ви зможете знайти більше для мене?
  - Ви запитуєте про те, що сталося з тим торговцем який був до мене? Я не знаю. *Зовсім не знаю...*
  - 'Тобі подобається моя колекція пляшок? Мені подобається моя колекція пляшок. Що? Там дійсно усюди написано "Тверді напої"? Ви впевнені, що це те, що там написано?'
