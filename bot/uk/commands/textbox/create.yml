    ephemeral: Якщо ви збираєтеся додавати це в ⭐ Обране - переконайтеся що ви його завантажите, та відправите у якесь інше місце. Файли у ефемерних повідомленнях (які можете бачити лише ви) мають дуже короткий термін життя, Discord видалить їх десь після 15 хвилин. Переконайтеся що ви це зберегаєте, інакше воно потім появиться як блакитний квадратик у вашому обраному
