discovery:
  description: |
    ![Лого Світової Машини](https://media.discordapp.net/attachments/1025158501540036639/1049326772161888369/The_World_Machine_Logo.png?ex=69cf2176&is=69cdcff6&hm=ce5a2b440655811664745c5b0b4ada8ed8e6694ad2854f9d40aacb51d668f873&)

    💡 **Принесіть світ OneShot до вашого Discord сервера!**
    Світова Машина тепер може блукати інтернетом, і взаємодіє з вами через Proxot
    (майже увесь інтерфейс локалізований українською!)

    👾 **Нікоґотчі (Віртуальні улюбленці/Тамагочі)**
    Прихистіть та дбайте про власних крихітних персонажів з OneShot! Годуйте їх, чистьте та багато гладьте. Підвищуйте їхні характеристики та хваліться своїми щасливими супутниками перед друзями (придбайте капсулу в `/магазинчик`у (`/shop`), а потім користайтеся `/нікоґотчі яктам` (`/nikogotchi check`))

    💬 **Власні текстові вікна**
    Створюйте будь-які репліки! Використовуйте команду `/текствікно створити` (`/textbox create`), щоб генерувати анімовані діалогові вікна в стилі OneShot, як ось це: ![Анімоване текстове вікно з OneShot. Спочатку Світова Машина з квіткою proxot на капелюсі каже: "вау, ця штука discord така класна і неймовірна". Потім Кіп Сільверпойнт в сонцезахисних окулярах відповідає: "підтверджую"](https://cdn.discordapp.com/attachments/1336864890706595852/1489151977349709874/TWM_textbox_2_1775111862.gif)

    📺 **Трансмісії**
    Подібно до "userphone" бота Yggdrasil, Трансмісії дозволяють вам телефонувати та спілкуватися в реальному часі з користувачами на зовсім інших Discord серверах (використайте `/трансміт підключитись` (`/transmit connect`) на обох серверах)

    🪪 **Марки профілю**
    Покажіть свою відданість справі. Здобувайте унікальні марки для вашого профілю Proxot, досягаючи нових віх, та хизуйтеся своєю статистикою (`/профіль подивитись` (`/profile view`))
